<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jira MCP Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Jira MCP Dashboard</span>
    </div>
    <div class="filters">
      <input id="f-search" type="search" placeholder="검색: 키 · 제목 · 라벨" autocomplete="off">
      <select id="f-status" title="상태 카테고리">
        <option value="all">전체 상태</option>
        <option value="new">To Do</option>
        <option value="indeterminate">진행 중</option>
        <option value="done">완료</option>
      </select>
      <label class="check"><input id="f-hidedone" type="checkbox" checked> 완료 숨김</label>
      <label class="check"><input id="f-deps" type="checkbox" checked> 의존성</label>
      <button id="f-expand" class="btn ghost sm">모두 펼침</button>
      <button id="f-collapse" class="btn ghost sm">모두 접기</button>
      <button id="f-reorder" class="btn ghost sm">그룹 순서 조정</button>
      <button id="f-new" class="btn sm">+ 새 티켓</button>
      <button id="f-refresh" class="btn sm">새로고침</button>
    </div>
  </header>

  <div class="querybar">
    <span class="qb-label">JQL</span>
    <input id="q-input" type="text" autocomplete="off"
      placeholder="필터링 쿼리를 입력해 시작하세요 — 예: project = UNIFI AND statusCategory != Done ORDER BY duedate ASC">
    <button id="q-run" class="btn">조회 시작</button>
  </div>

  <div id="status-line" class="status-line"></div>

  <main class="layout">
    <div class="content">
      <section class="panel">
        <h2 class="panel-title">타임라인 (D-1 ~ D+5) <span class="legend">
          <i class="lg bk-overdue"></i>지남 <i class="lg bk-today"></i>오늘
          <i class="lg bk-thisWeek"></i>이번주 <i class="lg bk-later"></i>이후</span></h2>
        <div id="gantt" class="gantt-host"></div>
      </section>

      <section id="out-of-range-section" class="panel" style="display:none;">
        <h2 class="panel-title">범위 밖 티켓</h2>
        <div id="out-of-range" class="oor-container"></div>
      </section>

      <section class="panel">
        <h2 class="panel-title">티켓 (라벨 그룹)</h2>
        <div id="cards" class="cards-host"></div>
      </section>
    </div>

    <aside id="detail" class="detail"></aside>
  </main>

  <!-- 그룹 순서 조정 모달 -->
  <div id="reorder-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>그룹 순서 조정</h3>
        <button id="reorder-close" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">드래그하여 순서를 변경하세요. 저장하면 간트 차트와 티켓 카드의 그룹 순서가 변경됩니다.</p>
        <div id="reorder-list" class="reorder-list"></div>
      </div>
      <div class="modal-footer">
        <button id="reorder-cancel" class="btn ghost">취소</button>
        <button id="reorder-save" class="btn">저장</button>
      </div>
    </div>
  </div>

  <!-- 새 티켓 생성 모달 -->
  <div id="create-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>새 티켓 생성</h3>
        <button id="create-close" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">필수: 프로젝트 · 유형 · 제목. 생성 의도는 대기열에 추가되고, Claude Code가 MCP로 실제 생성한 뒤 보드에 반영합니다.</p>
        <form id="create-form" class="create-form" autocomplete="off"></form>
      </div>
      <div class="modal-footer">
        <button id="create-cancel" class="btn ghost">취소</button>
        <button id="create-submit" class="btn">티켓 생성</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
