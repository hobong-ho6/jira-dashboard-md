<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jira MCP Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Jira MCP Dashboard</span>
    </div>
    <div class="filters">
      <input id="f-search" type="search" placeholder="검색: 키 · 제목 · 라벨" autocomplete="off">
      <select id="f-status" title="상태 카테고리">
        <option value="all">전체 상태</option>
        <option value="new">To Do</option>
        <option value="indeterminate">진행 중</option>
        <option value="done">완료</option>
      </select>
      <label class="check"><input id="f-hidedone" type="checkbox" checked> 완료 숨김</label>
      <label class="check"><input id="f-deps" type="checkbox" checked> 의존성</label>
      <button id="f-expand" class="btn ghost sm">모두 펼침</button>
      <button id="f-collapse" class="btn ghost sm">모두 접기</button>
      <button id="f-refresh" class="btn sm">새로고침</button>
    </div>
  </header>

  <div class="querybar">
    <span class="qb-label">JQL</span>
    <input id="q-input" type="text" autocomplete="off"
      placeholder="필터링 쿼리를 입력해 시작하세요 — 예: project = UNIFI AND statusCategory != Done ORDER BY duedate ASC">
    <button id="q-run" class="btn">조회 시작</button>
  </div>

  <div id="status-line" class="status-line"></div>

  <main class="layout">
    <div class="content">
      <section class="panel">
        <h2 class="panel-title">타임라인 <span class="legend">
          <i class="lg bk-overdue"></i>지남 <i class="lg bk-today"></i>오늘
          <i class="lg bk-thisWeek"></i>이번주 <i class="lg bk-later"></i>이후</span></h2>
        <div id="gantt" class="gantt-host"></div>
      </section>

      <section class="panel">
        <h2 class="panel-title">티켓 (라벨 그룹)</h2>
        <div id="cards" class="cards-host"></div>
      </section>
    </div>

    <aside id="detail" class="detail"></aside>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
